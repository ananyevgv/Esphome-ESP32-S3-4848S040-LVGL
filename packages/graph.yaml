lvgl:
  pages:
# Вывод на экран 
    - id: graph_page
      bg_color: 0x000000
      scrollbar_mode: "OFF"
      scrollable: false
      widgets:
        # Зеленый
        - line:
            points:
              - 0, 0
            line_width: 1
            line_color: 0x00ff00
            line_rounded: false 
            id: graphik