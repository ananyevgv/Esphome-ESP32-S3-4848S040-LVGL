globals:
  - id: mass_sensor
    type: float[49] #uint8_t
 #   restore_value: yes
    
graph:
  # Show bare-minimum auto-ranged graph
  - id: temperature_graph
    sensor: bme680_t
    duration: 1 min
    width: 151
    height: 51 
    
#float esphome::graph::HistoryData::get_value ( int idx ) const
#-------------------------------------------
# INTERVAL
#-------------------------------------------
interval:    
  - interval: 10 s #1min
    then:
      - lambda: |-
          for (int i = 0; i < 49; i++) {
            id(mass_sensor)[i] = id(mass_sensor)[i+1];
          }
          id(mass_sensor)[48] = id(bme680_t).state*10;
          
      - lvgl.line.update:
          id: graphik
          points:
            - x: 0
              y: !lambda return   360 - id(mass_sensor)[0];
            - x: 10
              y: !lambda return   360 - id(mass_sensor)[1];
