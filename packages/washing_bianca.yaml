#-------------------------------------------
# ПАКЕТ ДЛЯ ОТОБРАЖЕНИЯ СТИРАЛЬНОЙ МАШИНЫ BIANCA
# Для интеграции Bianca Версия: 2.4.3
# https://github.com/NagibinA/Bianca
#-------------------------------------------
# 
# ПОДКЛЮЧЕНИЕ ПАКЕТА:
# ------------------------------------------
# packages:
#   washing_bianca: !include packages/washing_bianca.yaml
#
#-------------------------------------------

substitutions:
  icons_temperature: "\U000F0510"  # mdi:coolant-temperature
  icons_spin:        "\U000F0464"  # mdi:reload
  icons_time:        "\U000F1AE1"  # mdi:timer-outline
  collor_off: 0xB6B6B6
  collor_on: 0x0000ff
  collor_err: 0xff0000

  # Имена сенсоров для интеграции Bianca 2.4.3
  bianca_program: sensor.bianca_program
  bianca_temperature: sensor.bianca_temperature
  bianca_spin_speed: sensor.bianca_spin_speed
  bianca_remote_control: sensor.bianca_remote_control
  bianca_machine_state: sensor.bianca_machine_state
  bianca_program_phase: sensor.bianca_program_phase
  bianca_remaining_time: sensor.bianca_remaining_time
  bianca_available: binary_sensor.bianca_available

#-------------------------------------------
# FONT
#-------------------------------------------
font:
  - file: "font/DSEG7ModernMini-Bold.ttf"
    id: SEG20
    glyphs: ${number_characters}
    size: 20
    bpp: 4  
    extras:
      - file: 'font/materialdesignicons-webfont.ttf'
        glyphs: [
          $icons_temperature,
          $icons_spin,
          $icons_time
        ]  
    
  - file: "gfonts://Roboto"
    id: washing_font
    size: 20
    bpp: 4
    glyphs: ${characters}
    
#-------------------------------------------
# IMAGE
#-------------------------------------------
image:
  - file: "picture/washing_transparent.png"
    id: image_washing
    resize: 450x450
    type: RGB565
    transparency: alpha_channel
    
#-------------------------------------------
# SCRIPT
#-------------------------------------------
script:
  - id: off_collor_cp
    then:
      - lvgl.widget.update:
          id: washing_cp_1
          line_color: $collor_off
      - lvgl.widget.update:
          id: washing_cp_2
          line_color: $collor_off
      - lvgl.widget.update:
          id: washing_cp_3
          line_color: $collor_off
      - lvgl.widget.update:
          id: washing_cp_4
          line_color: $collor_off
      - lvgl.widget.update:
          id: washing_cp_5
          line_color: $collor_off
      - lvgl.widget.update:
          id: washing_cp_6
          line_color: $collor_off          
      - lvgl.widget.update:
          id: washing_cp_7
          line_color: $collor_off          
      - lvgl.widget.update:
          id: washing_cp_8
          line_color: $collor_off          
          
  - id: on_collor_cp
    then:
        - if:
            condition:
              lambda: 'return id(bianca_available).state && id(program_number).state == 1;'
            then:
              - lvgl.widget.update:
                  id: washing_cp_1
                  line_color: $collor_on
        - if:
            condition:
              lambda: 'return id(bianca_available).state && id(program_number).state == 2;'
            then:
              - lvgl.widget.update:
                  id: washing_cp_2
                  line_color: $collor_on        
        - if:
            condition:
              lambda: 'return id(bianca_available).state && id(program_number).state == 3;'
            then:
              - lvgl.widget.update:
                  id: washing_cp_3
                  line_color: $collor_on                     
        - if:
            condition:
              lambda: 'return id(bianca_available).state && id(program_number).state == 4;'
            then:
              - lvgl.widget.update:
                  id: washing_cp_4
                  line_color: $collor_on
        - if:
            condition:
              lambda: 'return id(bianca_available).state && id(program_number).state == 5;'
            then:
              - lvgl.widget.update:
                  id: washing_cp_5
                  line_color: $collor_on        
        - if:
            condition:
              lambda: 'return id(bianca_available).state && id(program_number).state == 6;'
            then:
              - lvgl.widget.update:
                  id: washing_cp_6
                  line_color: $collor_on        
        - if:
            condition:
              lambda: 'return id(bianca_available).state && id(program_number).state == 7;'
            then:
              - lvgl.widget.update:
                  id: washing_cp_7
                  line_color: $collor_on        
        - if:
            condition:
              lambda: 'return id(bianca_available).state && id(program_number).state == 8;'
            then:
              - lvgl.widget.update:
                  id: washing_cp_8
                  line_color: $collor_on   

  - id: off_collor_ps
    then:
      - lvgl.widget.update:
          id: washing_ps_1
          line_color: $collor_off
      - lvgl.widget.update:
          id: washing_ps_2
          line_color: $collor_off
      - lvgl.widget.update:
          id: washing_ps_3
          line_color: $collor_off
      - lvgl.widget.update:
          id: washing_ps_4
          line_color: $collor_off 
        
  - id: on_collor_ps
    then:
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_program_state).state == "Отжим";'
          then:
            - lvgl.widget.update:
                id: washing_ps_2
                line_color: $collor_on
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_program_state).state == "Ночной отжим";'
          then:
            - lvgl.widget.update:
                id: washing_ps_2
                line_color: $collor_on          
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_program_state).state == "Пар";'
          then:
            - lvgl.widget.update:
                id: washing_ps_4
                line_color: $collor_on          
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_program_state).state == "Пред. стирка";'
          then:
            - lvgl.widget.update:
                id: washing_ps_3
                line_color: $collor_on  
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_program_state).state == "Стирка";'
          then:
            - lvgl.widget.update:
                id: washing_ps_3
                line_color: $collor_on        
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_program_state).state == "Полоскание";'
          then:
            - lvgl.widget.update:
                id: washing_ps_3
                line_color: $collor_on     
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_program_state).state == "Посл. полоскание";'
          then:
            - lvgl.widget.update:
                id: washing_ps_3
                line_color: $collor_on   
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_program_state).state == "Конец";'
          then:
            - lvgl.widget.update:
                id: washing_ps_1
                line_color: $collor_on   
            
      - if:
          condition:
            lambda: 'return !id(bianca_available).state || (id(washing_machine_state).state == "Бездействие" && id(program_number).state == 0);'
          then:
            - script.execute: off_collor_cp
            - lvgl.widget.update:
                id: washing_rc
                line_color: $collor_off
            - lvgl.label.update:
                id: d_washing_time
                text_color: $collor_off
            - lvgl.label.update:
                id: d_washing_spin
                text_color: $collor_off
            - lvgl.label.update:
                id: d_washing_temperature
                text_color: $collor_off
            - lvgl.label.update:
                id: d_washing_program_state
                text_color: $collor_off
            - lvgl.arc.update:
                id: arc_washing_percent
                value: 0

  - id: off_collor_ms
    then:
      - lvgl.widget.update:
          id: washing_ms_0
          line_color: $collor_off
      - lvgl.widget.update:
          id: washing_ms_1
          line_color: $collor_off
      - lvgl.widget.update:
          id: washing_ms_2
          line_color: $collor_off
          
  - id: on_collor_ms
    then:
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_machine_state).state == "Бездействие";'
          then:
            - lvgl.widget.update:
                id: washing_ms_0
                line_color: $collor_on
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_machine_state).state == "Работает";'
          then:
            - lvgl.widget.update:
                id: washing_ms_0
                line_color: $collor_on
            - lvgl.widget.update:
                id: washing_ms_1
                line_color: $collor_on
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_machine_state).state == "Пауза";'
          then:
            - lvgl.widget.update:
                id: washing_ms_0
                line_color: $collor_on
            - lvgl.widget.update:
                id: washing_ms_2
                line_color: $collor_on
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_machine_state).state == "Выбор отложенного запуска";'
          then:
            - lvgl.widget.update:
                id: washing_ms_0
                line_color: $collor_on
            - lvgl.widget.update:
                id: washing_ms_1
                line_color: $collor_on    
            - lvgl.widget.update:
                id: washing_ms_2
                line_color: $collor_on       
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_machine_state).state == "Задан отложенный запуск";'
          then:
            - lvgl.widget.update:
                id: washing_ms_0
                line_color: $collor_on
            - lvgl.widget.update:
                id: washing_ms_1
                line_color: $collor_on    
            - lvgl.widget.update:
                id: washing_ms_2
                line_color: $collor_on     
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_machine_state).state == "Ошибка";'
          then:
            - lvgl.widget.update:
                id: washing_ms_0
                line_color: $collor_err
            - lvgl.widget.update:
                id: washing_ms_1
                line_color: $collor_err    
            - lvgl.widget.update:
                id: washing_ms_2
                line_color: $collor_err
      - if:
          condition:
            lambda: 'return id(bianca_available).state && id(washing_machine_state).state == "Завершено";'
          then:
            - lvgl.widget.update:
                id: washing_ms_0
                line_color: $collor_on
            - lvgl.widget.update:
                id: washing_ms_1
                line_color: $collor_on    
            - lvgl.widget.update:
                id: washing_ms_2
                line_color: $collor_on
      - if:
          condition:
            lambda: 'return !id(bianca_available).state;'
          then:
            - script.execute: off_collor_ms

#-------------------------------------------
# BINARY SENSOR (доступность устройства)
#-------------------------------------------
binary_sensor:
  - platform: homeassistant
    id: bianca_available
    entity_id: ${bianca_available}
    on_state:
      then:
        - if:
            condition:
              lambda: 'return !id(bianca_available).state;'
            then:
              - script.execute: off_collor_cp
              - script.execute: off_collor_ps
              - script.execute: off_collor_ms
              - lvgl.widget.update:
                  id: washing_rc
                  line_color: $collor_off
              - lvgl.label.update:
                  id: d_washing_time
                  text_color: $collor_off
              - lvgl.label.update:
                  id: d_washing_spin
                  text_color: $collor_off
              - lvgl.label.update:
                  id: d_washing_temperature
                  text_color: $collor_off
              - lvgl.label.update:
                  id: d_washing_program_state
                  text_color: $collor_off
              - lvgl.arc.update:
                  id: arc_washing_percent
                  value: 0

#-------------------------------------------
# TEXT SENSOR
#-------------------------------------------
text_sensor:
  # оставшееся время в формате HH:MM
  - platform: homeassistant
    id: remaining_time_display
    entity_id: ${bianca_remaining_time}
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(bianca_available).state;'
            then:
              - lvgl.label.update:
                  id: d_washing_time
                  text:
                    format: "$icons_time %s"
                    args: ["x.c_str()"]
                  text_color: $collor_on
            else:
              - lvgl.label.update:
                  id: d_washing_time
                  text_color: $collor_off

  # удалённое управление (для изменения цвета иконки)
  - platform: homeassistant
    id: remote_control_str
    entity_id: ${bianca_remote_control}
    on_value:
      then:
        - if:
            condition:
              lambda: 'return id(bianca_available).state && x == "Вкл";'
            then:
              - lvgl.widget.update:
                  id: washing_rc
                  line_color: $collor_on
            else:
              - lvgl.widget.update:
                  id: washing_rc
                  line_color: $collor_off

  # состояние машины
  - platform: homeassistant
    id: washing_machine_state
    entity_id: ${bianca_machine_state}
    on_value:
      then:
        - script.execute: off_collor_ms
        - script.execute: on_collor_ms
        
  # фаза выполнения программы (выводим как есть на русском)
  - platform: homeassistant
    id: washing_program_state
    entity_id: ${bianca_program_phase}
    on_value:
      then:
        - script.execute: off_collor_ps
        - if:
            condition:
              lambda: 'return id(bianca_available).state;'
            then:
              - lvgl.label.update:
                  id: d_washing_program_state
                  text: !lambda return x;
                  text_color: $collor_on
            else:
              - lvgl.label.update:
                  id: d_washing_program_state
                  text_color: $collor_off
        - script.execute: on_collor_ps

#-------------------------------------------
# SENSOR
#-------------------------------------------
sensor:
  # номер выбранной программы (из атрибута program_number)
  - platform: homeassistant
    id: program_number
    entity_id: ${bianca_program}
    attribute: program_number
    filters:
      - filter_out: nan
    on_value:
      then:
        - script.execute: off_collor_cp
        - script.execute: on_collor_cp
      
  # температура
  - platform: homeassistant
    id: temperature
    entity_id: ${bianca_temperature}
    unit_of_measurement: °C
    state_class: measurement
    device_class: temperature
    filters:
      - filter_out: nan
    on_value:
      - if:
          condition:
            lambda: 'return id(bianca_available).state;'
          then:
            - lvgl.label.update:
                id: d_washing_temperature
                text: 
                  format: "$icons_temperature %.0f"
                  args: x  
                text_color: $collor_on
          else:
            - lvgl.label.update:
                id: d_washing_temperature
                text_color: $collor_off
          
  # скорость отжима
  - platform: homeassistant
    id: spin_speed
    entity_id: ${bianca_spin_speed}
    unit_of_measurement: rpm
    filters:
      - filter_out: nan
    on_value:
      - if:
          condition:
            lambda: 'return id(bianca_available).state;'
          then:
            - lvgl.label.update:
                id: d_washing_spin
                text: 
                  format: "$icons_spin %.0f"
                  args: x  
                text_color: $collor_on
          else:
            - lvgl.label.update:
                id: d_washing_spin
                text_color: $collor_off

#-------------------------------------------
# LVGL
#-------------------------------------------
lvgl:
  pages:
    - id: washing_page
      bg_color: 0x000000
      scrollbar_mode: "OFF"
      scrollable: false
      widgets:
        - line:
            points:
              - 210, 50
              - 270, 50
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_ms_0
            
        - line:
            points:
              - 270, 150
              - 300, 150
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_ms_1
     
        - line:
            points:
              - 300, 150
              - 330, 150
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_ms_2
            
        - line:
            points:
              - 290, 70
              - 350, 70
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_cp_1
            
        - line:
            points:
              - 350, 120
              - 420, 120
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_cp_2  
            
        - line:
            points:
              - 390, 190
              - 450, 190
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_cp_3
            
        - line:
            points:
              - 390, 260
              - 450, 260
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_cp_4         
            
        - line:
            points:
              - 350, 340
              - 400, 340
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_cp_5          
           
        - line:
            points:
              - 290, 380
              - 350, 380
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_cp_6
            
        - line:   
            points:
              - 210, 400
              - 270, 400
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_cp_7
            
        - line:   
            points:
              - 130, 380
              - 190, 380
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_cp_8  

        - line:
            points:
              - 70, 340
              - 130, 340
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_ps_1 
 
        - line:
            points:
              - 30, 260
              - 90, 260
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_ps_2  
 
        - line:
            points:
              - 30, 190
              - 90, 190
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_ps_3
            
        - line:
            points:
              - 70, 120
              - 130, 120
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_ps_4
            
        - line:
            points:
              - 140, 150
              - 220, 150
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: line_washing_15
     
        - line:
            points:
              - 130, 70
              - 190, 70
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_rc
 
        - line:
            points:
              - 170, 320
              - 300, 320
            line_width: 60
            line_color: $collor_off
            line_rounded: false   
            id: washing_pc
            
        - obj:
            bg_color: $collor_off
            width: 260 
            height: 70
            align: CENTER 
            scrollbar_mode: "OFF"
            scrollable: false
            y: -15
            widgets:
              - label:
                  y: -5
                  align: TOP_LEFT
                  text: 88:88
                  text_font: SEG20
                  text_color: $collor_off
                  id: d_washing_time
              - label:
                  y: 5
                  align: BOTTOM_LEFT
                  text: 0123456789012345678901
                  text_font: washing_font
                  text_color: $collor_off
                  id: d_washing_program_state
              - label:
                  y: -5
                  align: TOP_RIGHT
                  text: 1888
                  text_font: SEG20
                  text_color: $collor_off
                  id: d_washing_spin
              - label:
                  y: 5
                  align: BOTTOM_RIGHT
                  text: 88
                  text_font: SEG20
                  text_color: $collor_off
                  id: d_washing_temperature

        - image:
            align: CENTER
            y: -15
            src: image_washing

        - arc:
            id: arc_washing_percent
            y: -15
            align: CENTER
            arc_width: 20
            width: 445
            height: 445
            min_value: 0
            max_value: 100
            start_angle: 0
            end_angle: 360
            rotation: 90
            value: 100    
            indicator:
              arc_width: 20